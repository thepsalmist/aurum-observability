name: aurum-observability

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mt5fx}
      POSTGRES_USER: ${POSTGRES_USER:-mt5fx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mt5fx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-mt5fx}
      UV_PROJECT_ENVIRONMENT: /tmp/aurum-venv
      UV_CACHE_DIR: /tmp/uv-cache
      UV_FROZEN: "true"
    command: ["scripts/run-migrations.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace:ro
    restart: "no"

  seaweedfs:
    image: chrislusf/seaweedfs:3.85
    environment:
      SEAWEEDFS_S3_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY:-mt5fx-publisher}
      SEAWEEDFS_S3_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY:-change-me}
    entrypoint: ["/scripts/start-seaweedfs.sh"]
    ports:
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
    volumes:
      - seaweedfs-data:/data
      - ./scripts:/scripts:ro

  grafana:
    image: grafana/grafana-oss:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      POSTGRES_DB: ${POSTGRES_DB:-mt5fx}
      POSTGRES_USER: ${POSTGRES_USER:-mt5fx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres-data:
  seaweedfs-data:
  grafana-data:
