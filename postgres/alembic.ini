[alembic]
script_location = %(here)s
version_locations = %(here)s/migrations/versions
prepend_sys_path = .
path_separator = os

# Runtime configuration comes from DATABASE_URL. This placeholder is kept so
# Alembic has a valid config key when running commands that do not connect.
sqlalchemy.url = postgresql+psycopg://user:password@localhost:5432/database

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
